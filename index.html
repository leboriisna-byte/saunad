<!DOCTYPE html>
<html lang="et">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tesler Sauna Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app">
    <!-- Header -->
    <header class="top-bar">
      <div class="logo">
        <img src="/Group.svg" alt="Tesler Grupp" />
      </div>
      <nav class="nav-links">
        <a href="#" class="nav-link active">Väike Delux 2.4m</a>
      </nav>
      <div class="header-actions">
        <a href="#" class="contact-link">Kontakt</a>
      </div>
    </header>

    <!-- 3D Canvas -->
    <canvas id="canvas3d"></canvas>
    
    <!-- Loading -->
    <div id="loading">
      <div class="spinner"></div>
      <span>Laadimine...</span>
    </div>

    <!-- Bottom UI Overlay -->
    <div class="bottom-ui">
      <div class="product-info">
        <h1>Väike Delux (2.4m)</h1>
        <p class="product-desc">Luksus loodi nautimiseks, nagu ka hea kuum leil ja külmad karastusjoogid.</p>
        <div class="price-container">
          <span class="price-label">Alates:</span>
          <span class="price">4,030.00€</span>
          <span class="vat">(sis. KM 780.00€ | ilma KM-ita 3,250.00€)</span>
        </div>
      </div>
      
      <div class="action-buttons">
        <button class="icon-btn" title="Mõõdud">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </button>
        <button class="icon-btn" title="Jaga">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
        <button class="icon-btn" title="Täisekraan" id="fullscreen-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
